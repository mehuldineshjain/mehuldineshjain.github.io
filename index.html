<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mehul Jain — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <!-- NAV  — center sliding title (faint prev · bold current · faint next);
       labels come from the card registry via main.js -->
  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a href="#home" class="nav-logo">MJ<span class="dot">.</span></a>

      <div class="nav-title" id="navTitle" aria-live="polite">
        <button class="nt-prev" id="ntPrev" type="button" aria-label="Previous section"></button>
        <span class="nt-cur" id="ntCur"></span>
        <button class="nt-next" id="ntNext" type="button" aria-label="Next section"></button>
      </div>

      <div class="nav-actions">
        <button class="theme-toggle neu-flat" id="themeToggle" type="button"
          aria-label="Switch theme" aria-pressed="false">☾</button>

        <!-- HAMBURGER — EXPERIMENTAL. Uncomment to test the mobile menu.
             Paired JS lives in js/main.js (guarded, no-op while commented).
        <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
        -->
      </div>
    </div>
  </nav>

  <!-- MOBILE MENU — EXPERIMENTAL. Uncomment together with the hamburger above.
       List items are injected from the registry into #mobileMenuList by main.js.
  <div class="mobile-menu" id="mobileMenu">
    <ul id="mobileMenuList"></ul>
  </div>
  -->

  <!-- DECK STAGE — one card per registry entry, injected by deck.js -->
  <main class="deck" id="deck">
    <div class="deck-stage" id="deckStage"></div>

    <!-- left / right affordances: persistent swipe hint + click control -->
    <button class="deck-arrow deck-arrow--left" id="arrowLeft" type="button" aria-label="Previous section">‹</button>
    <button class="deck-arrow deck-arrow--right" id="arrowRight" type="button" aria-label="Next section">›</button>

    <!-- progress dots (injected from registry) -->
    <div class="deck-dots" id="deckDots" aria-hidden="true"></div>

    <!-- subtle swipe / keyboard hint -->
    <div class="swipe-hint" id="swipeHint" aria-hidden="true">
      <span class="hint-arrow">‹</span>
      <span class="hint-text">
        <span class="hint-touch">Swipe ↔, ↕ for detail</span><span class="hint-keys">← → sections · ↑ ↓ detail</span>
      </span>
      <span class="hint-arrow">›</span>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <span class="footer-copy">Crafted with care · <span id="year"></span></span>
  </footer>

  <!-- single source of truth -->
  <script src="js/data.js"></script>
  <!-- card registry: order + builders -->
  <script src="js/registry.js"></script>
  <!-- theme toggle -->
  <script src="js/theme.js"></script>
  <!-- 3D swipe engine -->
  <script src="js/deck.js"></script>
  <!-- bootstrap / wiring -->
  <script src="js/main.js"></script>
</body>

</html>
